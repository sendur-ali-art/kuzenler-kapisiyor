<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Kuzenler Kapışıyor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="renk-secici" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; justify-content: center; align-items: center; flex-direction: column;">
        <h2 style="color: white; margin-bottom: 20px;">Renk Seç!</h2>
        <div style="display: flex; gap: 15px; flex-wrap: wrap; justify-content: center;">
            <div class="kart kirmizi" onclick="renkSecildi('kirmizi')">Kırmızı</div>
            <div class="kart mavi" onclick="renkSecildi('mavi')">Mavi</div>
            <div class="kart yesil" onclick="renkSecildi('yesil')">Yeşil</div>
            <div class="kart sari" onclick="renkSecildi('sari')">Sarı</div>
        </div>
    </div>

    <div id="oyun-alani">
        <ul id="oyuncu-listesi"></ul>
        <div id="masa">
            <div class="kart deste" id="deste-cek">Kart Çek</div>
            <div class="kart ortadaki-kart" id="ortadaki-kart">...</div>
        </div>
        <div id="kartlarim"></div>
        
        <div id="chat-kutusu">
            <div id="mesajlar"></div>
            <div id="mesaj-input-grubu">
                <input type="text" id="mesaj-metni" placeholder="Mesaj yaz..." maxlength="50">
                <button id="mesaj-gonder">➤</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
</body>
</html>
